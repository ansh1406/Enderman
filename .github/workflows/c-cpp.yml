name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: cpp-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  DEPS_INSTALL_PREFIX: ${{ github.workspace }}/.deps

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Linux packages
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake

    - name: Set CMake options
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          echo "CMAKE_CONFIGURE_EXTRA=" >> "$GITHUB_ENV"
        else
          echo "CMAKE_CONFIGURE_EXTRA=-DCMAKE_BUILD_TYPE=${BUILD_TYPE}" >> "$GITHUB_ENV"
        fi

    - name: Build and install Http-Server dependency
      run: |
        git clone --depth 1 https://github.com/ansh1406/Http-Server.git
        cmake -S Http-Server -B Http-Server/build \
          ${CMAKE_CONFIGURE_EXTRA} \
          -DCMAKE_INSTALL_PREFIX=${DEPS_INSTALL_PREFIX}
        cmake --build Http-Server/build --config ${BUILD_TYPE} --parallel
        cmake --install Http-Server/build --config ${BUILD_TYPE}

    - name: Build and install json module
      run: |
        cmake -S modules/json -B modules/json/build \
          ${CMAKE_CONFIGURE_EXTRA} \
          -DCMAKE_PREFIX_PATH=${DEPS_INSTALL_PREFIX} \
          -DCMAKE_INSTALL_PREFIX=${DEPS_INSTALL_PREFIX}
        cmake --build modules/json/build --config ${BUILD_TYPE} --parallel
        cmake --install modules/json/build --config ${BUILD_TYPE}

    - name: Configure Enderman
      run: |
        cmake -S . -B build \
          ${CMAKE_CONFIGURE_EXTRA} \
          -DCMAKE_PREFIX_PATH=${DEPS_INSTALL_PREFIX} \
          -DENDERMAN_PLUGIN_JSON=ON

    - name: Build Enderman
      run: cmake --build build --config ${BUILD_TYPE} --parallel

    - name: Run tests
      run: ctest --test-dir build --build-config ${BUILD_TYPE} --output-on-failure
